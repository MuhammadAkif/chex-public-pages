services:
  # ── PostgreSQL 17 ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: chex-public-pages-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-payload_app}
      POSTGRES_USER: ${POSTGRES_USER:-payload}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payload}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-payload} -d ${POSTGRES_DB:-payload_app}
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js + Payload CMS app ───────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Baked into the client bundle at build time — override for production.
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-http://localhost:3000}
    container_name: chex-public-pages-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-http://localhost:3000}

      # Uses DATABASE_URL from .env when present. If absent, it falls back to
      # the local postgres service over the internal Docker network.
      DATABASE_URL: >-
        ${DATABASE_URL:-postgresql://${POSTGRES_USER:-payload}:${POSTGRES_PASSWORD:-payload}@postgres:5432/${POSTGRES_DB:-payload_app}}

      # Change this to a long random string in production.
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-change-me-before-going-to-production}

      # ── S3 media storage (optional) ─────────────────────────────────────────
      # Leave these blank to disable S3. Without S3, media uploads will not
      # persist across container restarts unless you mount a volume.
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Persist local media uploads when S3 is not configured.
      - media-uploads:/app/public/media

volumes:
  postgres-data:
  media-uploads:
